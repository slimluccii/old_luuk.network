name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Install & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          DATOCMS_TOKEN: ${{ secrets.DATOCMS_TOKEN }}

      - name: Zip function
        run: zip -r dist/function.zip dist/function

      - name: Deploy function to Scaleway
        uses: voorhoede/scaleway-functions-deploy-action/actions/deploy-function@main
        with:
          region: ${{ secrets.SCW_REGION }}
          scw_secret_access_key: ${{ secrets.SCW_SECRET_ACCESS_KEY }}
          scw_project_id: ${{ secrets.SCW_PROJECT_ID }}
          dist_path: dist
