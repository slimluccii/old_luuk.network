fragment HeroBlock on HeroBlockRecord {
  subjectImage {
    responsiveImage(
      imgixParams: { fit: crop, ar: "1:1", auto: format, w: 400 }
    ) {
      alt
      base64
      height
      src
      width
    }
  }
  coverImage {
    responsiveImage {
      alt
      aspectRatio
      base64
      bgColor
      height
      src
      sizes
      title
      width
    }
  }
  title
  description
}
